<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Sketchef">
  <!-- tile -->
  <rect width="100" height="100" rx="22" fill="#0b1018"/>
  <rect x="1.5" y="1.5" width="97" height="97" rx="20.5" fill="none" stroke="#1c2638" stroke-width="2"/>

  <!-- chef's toque (puffs) -->
  <g fill="#2dd4bf">
    <circle cx="34" cy="44" r="15"/>
    <circle cx="50" cy="36" r="18"/>
    <circle cx="66" cy="44" r="15"/>
    <rect x="30" y="42" width="40" height="22"/>
  </g>

  <!-- hat band rendered as a little circuit board -->
  <rect x="28" y="60" width="44" height="14" rx="3" fill="#15a594"/>
  <!-- trace across the band -->
  <rect x="33" y="66" width="34" height="2.4" rx="1.2" fill="#0b1018"/>
  <!-- solder pads -->
  <g fill="#e0a45a">
    <circle cx="38" cy="67.2" r="2.7"/>
    <circle cx="50" cy="67.2" r="2.7"/>
    <circle cx="62" cy="67.2" r="2.7"/>
  </g>

  <!-- chip legs / circuit traces descending from the band -->
  <g stroke="#e0a45a" stroke-width="2.6" stroke-linecap="round">
    <line x1="40" y1="74" x2="40" y2="82"/>
    <line x1="50" y1="74" x2="50" y2="85"/>
    <line x1="60" y1="74" x2="60" y2="82"/>
  </g>
  <g fill="#e0a45a">
    <circle cx="40" cy="84" r="2.3"/>
    <circle cx="50" cy="87" r="2.3"/>
    <circle cx="60" cy="84" r="2.3"/>
  </g>
</svg>
