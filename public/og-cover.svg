<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630"
     font-family="'Segoe UI', system-ui, -apple-system, Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="1.4" cy="1.4" r="1.4" fill="#7896be" fill-opacity="0.06"/>
    </pattern>
    <radialGradient id="glowTeal" cx="85%" cy="2%" r="62%">
      <stop offset="0%" stop-color="#2dd4bf" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#2dd4bf" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowCopper" cx="2%" cy="100%" r="55%">
      <stop offset="0%" stop-color="#b5793a" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#b5793a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- background -->
  <rect width="1200" height="630" fill="#0a0e16"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect width="1200" height="630" fill="url(#glowTeal)"/>
  <rect width="1200" height="630" fill="url(#glowCopper)"/>
  <rect x="8" y="8" width="1184" height="614" rx="26" fill="none" stroke="#1c2638" stroke-width="2"/>

  <!-- brand row: chef-hat-meets-circuit mark + wordmark -->
  <g transform="translate(92,70)">
    <g transform="scale(0.82)">
      <g fill="#2dd4bf">
        <circle cx="34" cy="44" r="15"/>
        <circle cx="50" cy="36" r="18"/>
        <circle cx="66" cy="44" r="15"/>
        <rect x="30" y="42" width="40" height="22"/>
      </g>
      <rect x="28" y="60" width="44" height="14" rx="3" fill="#15a594"/>
      <rect x="33" y="66" width="34" height="2.4" rx="1.2" fill="#0a0e16"/>
      <g fill="#e0a45a">
        <circle cx="38" cy="67.2" r="2.7"/>
        <circle cx="50" cy="67.2" r="2.7"/>
        <circle cx="62" cy="67.2" r="2.7"/>
      </g>
      <g stroke="#e0a45a" stroke-width="2.6" stroke-linecap="round">
        <line x1="40" y1="74" x2="40" y2="82"/>
        <line x1="50" y1="74" x2="50" y2="85"/>
        <line x1="60" y1="74" x2="60" y2="82"/>
      </g>
      <g fill="#e0a45a">
        <circle cx="40" cy="84" r="2.3"/>
        <circle cx="50" cy="87" r="2.3"/>
        <circle cx="60" cy="84" r="2.3"/>
      </g>
    </g>
    <text x="104" y="56" font-size="44" font-weight="700" fill="#e8eef8" letter-spacing="-0.5">Sketchef</text>
    <text x="106" y="84" font-size="18" font-weight="600" fill="#61708d" letter-spacing="3">ARDUINO PROJECT RECOMMENDER</text>
  </g>

  <!-- headline -->
  <text x="90" y="312" font-size="80" font-weight="800" fill="#e8eef8" letter-spacing="-2">What can you build</text>
  <text x="90" y="398" font-size="80" font-weight="800" letter-spacing="-2" fill="#2dd4bf">right now?</text>

  <!-- subhead -->
  <text x="92" y="458" font-size="29" fill="#9aa7c0">Pick your Arduino board and the parts you own —</text>
  <text x="92" y="496" font-size="29" fill="#9aa7c0">get the projects you can actually build, with wiring, steps &amp; code.</text>

  <!-- flavor chips -->
  <g transform="translate(92,532)" font-size="21" font-weight="600">
    <g>
      <rect width="178" height="44" rx="22" fill="#34d399" fill-opacity="0.12" stroke="#34d399" stroke-opacity="0.5"/>
      <text x="89" y="29" text-anchor="middle" fill="#34d399">You can build</text>
    </g>
    <g transform="translate(194,0)">
      <rect width="196" height="44" rx="22" fill="#2dd4bf" fill-opacity="0.12" stroke="#2dd4bf" stroke-opacity="0.5"/>
      <text x="98" y="29" text-anchor="middle" fill="#2dd4bf">One part away</text>
    </g>
    <g transform="translate(406,0)">
      <rect width="226" height="44" rx="22" fill="#ffffff" fill-opacity="0.04" stroke="#33405c"/>
      <text x="113" y="29" text-anchor="middle" fill="#9aa7c0">Buy-next optimizer</text>
    </g>
  </g>

  <!-- footer -->
  <text x="1108" y="566" text-anchor="end" font-size="19" fill="#61708d"
        font-family="ui-monospace, 'Cascadia Code', Consolas, monospace">React · Vite · static</text>
</svg>
